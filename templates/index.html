<!DOCTYPE html>
<html>
<head>

<title>AI Resume Analyzer V2</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h1 class="mb-4">AI Resume Analyzer</h1>

<form action="/analyze"
      method="post"
      enctype="multipart/form-data">

    <input
        class="form-control"
        type="file"
        name="resume"
        required>

    <button
        class="btn btn-primary mt-3"
        type="submit">

        Analyze Resume

    </button>

</form>

{% if result %}

<div class="card mt-5">

<div class="card-body">

<h3>Analysis</h3>

<pre>{{ result }}</pre>

</div>

</div>

{% endif %}

</div>

</body>
</html>
