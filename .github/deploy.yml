name: Deploy to EC2

on:
push:
branches:
- main

jobs:
deploy:

```
runs-on: ubuntu-latest

steps:

  - name: Checkout
    uses: actions/checkout@v4

  - name: Docker Login
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}

  - name: Build Image
    run: |
      docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-resume-analyzer:latest .

  - name: Push Image
    run: |
      docker push ${{ secrets.DOCKER_USERNAME }}/ai-resume-analyzer:latest

  - name: Deploy To EC2
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.EC2_HOST }}
      username: ${{ secrets.EC2_USER }}
      key: ${{ secrets.EC2_SSH_KEY }}

      script: |

        sudo docker pull ${{ secrets.DOCKER_USERNAME }}/ai-resume-analyzer:latest

        sudo docker stop ai-resume-analyzer || true

        sudo docker rm ai-resume-analyzer || true

        sudo docker run -d \
          --restart unless-stopped \
          -p 127.0.0.1:8000:8000 \
          -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
          --name ai-resume-analyzer \
          ${{ secrets.DOCKER_USERNAME }}/ai-resume-analyzer:latest
```
